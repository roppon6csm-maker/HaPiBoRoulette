<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ハピボルーレット ver.3.6.0</title>
    
    <link rel="preload" as="image" href="https://i.imgur.com/dyeH1D6.jpeg">
    <link rel="preload" as="image" href="https://i.imgur.com/skWZ5bB.png">

    <script>
        const imgUrls = [
            "https://i.imgur.com/dyeH1D6.jpeg", "https://i.imgur.com/Q4h6Sdv.jpeg", "https://i.imgur.com/xFq6HON.jpeg",
            "https://i.imgur.com/rnoZlTb.jpeg", "https://i.imgur.com/WVA6hdU.jpeg", "https://i.imgur.com/qT7Cbn3.jpeg",
            "https://i.imgur.com/Pq8kdam.jpeg", "https://i.imgur.com/F84QLmL.png", "https://i.imgur.com/bSPZH8v.png",
            "https://i.imgur.com/zsVs8tV.png", "https://i.imgur.com/QoEnzAy.png", "https://i.imgur.com/wUXQD9g.png",
            "https://i.imgur.com/sDvV2zp.png", "https://i.imgur.com/0nr5ml8.png", "https://i.imgur.com/R6OY57k.png",
            "https://i.imgur.com/skWZ5bB.png"
        ];
        const priorityUrls = ["https://i.imgur.com/dyeH1D6.jpeg", "https://i.imgur.com/skWZ5bB.png"];
        let isPriorityLoaded = false;
        const priorityPromise = Promise.all(priorityUrls.map(url => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = resolve; img.onerror = resolve; img.src = url;
            });
        })).then(() => { isPriorityLoaded = true; });

        imgUrls.forEach(url => { if (!priorityUrls.includes(url)) { const img = new Image(); img.src = url; } });
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
        document.addEventListener('wheel', (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
    </script>

    <style>
        :root { --bg-color: #f1f1f1; --slot-machine-color: #341f97; --accent-color: #eccc68; --text-color-dark: #333; }
        * { box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; overscroll-behavior: none; position: fixed; }
        body { background-color: var(--bg-color); color: var(--text-color-dark); font-family: sans-serif; text-align: center; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        #initialLoading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent-color); border-radius: 50%; animation: spin-loader 1s linear infinite; }
        @keyframes spin-loader { to { transform: rotate(360deg); } }

        #pwScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 6000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .pw-banner { width: 60%; max-width: 300px; margin-bottom: 20px; }
        .pw-container { display: flex; gap: 5px; margin-top: 10px; position: relative; width: 94%; justify-content: center; align-items: center; }
        .pw-input { width: 11%; max-width: 40px; height: 50px; background: #333; border: 2px solid var(--accent-color); border-radius: 8px; color: #fff; font-size: 22px; text-align: center; outline: none; }
        .pw-input:focus { background: #444; box-shadow: 0 0 10px var(--accent-color); }
        .pw-input:disabled { opacity: 0.5; border-color: #666; }
        .pw-separator { font-size: 20px; font-weight: bold; color: var(--accent-color); }
        
        #pwStatus { margin-top: 15px; font-size: 14px; height: 20px; color: var(--accent-color); font-weight: bold; }
        .pw-hint { margin-top: 5px; color: #ccc; font-size: 11px; }
        
        #pwNameContainer { margin-top: 30px; width: 80%; max-width: 280px; display: flex; flex-direction: column; gap: 10px; }
        .pw-name-label { font-size: 14px; font-weight: bold; color: #2ecc71; display: none; margin-bottom: -5px; }
        .pw-name-input { padding: 12px; border-radius: 8px; border: 2px solid #555; background: #222; color: #fff; font-size: 16px; width: 100%; text-align: center; outline: none; }
        .pw-name-input:disabled { opacity: 0.3; background: #111; border-color: #333; }
        .pw-ok-btn { padding: 12px; border-radius: 50px; border: none; background: var(--accent-color); color: #333; font-weight: bold; font-size: 16px; cursor: pointer; display: none; }

        /* 練習モードラベル：2pxアップ */
        #practiceModeLabel { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); display: none; color: #ff4757; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.8), 2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000; pointer-events: none; z-index: 100; white-space: nowrap; background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 4px; }

        .version-display { position: absolute; top: 10px; right: 15px; z-index: 200; font-size: 10px; opacity: 0.5; color: var(--text-color-dark); }
        .banner-container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 50px; position: relative; }
        .banner-container img { width: 100%; height: auto; display: block; border: none; }
        
        .winner-board { background: rgba(255,255,255,0.8); margin: 10px auto; padding: 10px; border-radius: 8px; width: 94%; max-width: 480px; border: 1px solid #ccc; box-sizing: border-box; min-height: 80px; }
        
        /* ボードタイトル：確率追加とサイズアップ対応 */
        #wb-title { color: #666; margin-bottom: 5px; font-weight: bold; line-height: 1.3; }
        .prob-display { font-size: 10px; color: #888; font-weight: normal; margin-bottom: 2px; }
        .title-main { font-size: 1.0rem; }

        .winner-grid { display: grid; gap: 5px; text-align: left; grid-template-columns: repeat(2, 1fr); font-size: 10px; }
        .winner-item { border-left: 3px solid var(--accent-color); background: rgba(236,204,104,0.1); padding-left: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-height: 1.5em; line-height: 1.5em; }
        
        .slot-machine { background: var(--slot-machine-color); border: 6px solid var(--accent-color); border-radius: 15px; width: 94%; max-width: 480px; margin: 15px auto; padding: 15px 5px; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        .reels-container { display: flex; justify-content: space-around; background: #000; padding: 8px; border-radius: 10px; height: 25vw; max-height: 120px; border: 2px solid #57606f; box-sizing: border-box; }
        .reel-window { width: 30%; height: 100%; background: #fff; border-radius: 5px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .reel-window img { width: 100%; height: 100%; object-fit: contain; }
        .reel-strip { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; }
        .symbol { height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .symbol img { max-height: 90%; max-width: 90%; object-fit: contain; }
        @keyframes spin { from { transform: translateY(0); } to { transform: translateY(-300%); } }
        .spinning { animation: spin 0.3s linear infinite; }
        
        @keyframes reel-stop-bounce {
            0% { transform: translateY(-5px); }
            50% { transform: translateY(5px); }
            100% { transform: translateY(0); }
        }
        .stop-bounce { animation: reel-stop-bounce 0.15s ease-out; }

        .stop-buttons { display: flex; justify-content: space-around; margin-top: 15px; }
        .stop-btn { width: 28%; padding: 12px 0; background: #ecf0f1; border: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px #bdc3c7; color: #333; cursor: pointer; font-size: 16px; touch-action: manipulation; }
        .stop-btn:disabled { background: #7f8c8d; color: #95a5a6; box-shadow: none; transform: translateY(2px); }
        .start-btn { background: #ff4757; color: #fff; border: none; padding: 15px 0; width: 90%; max-width: 320px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; box-shadow: 0 5px 0 #b33939; cursor: pointer; margin-top: 10px; touch-action: manipulation; }
        .start-btn:disabled { background: #7f8c8d; box-shadow: none; transform: translateY(4px); }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
        
        .toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: #fff; padding: 15px 25px; border-radius: 30px; z-index: 8000; display: none; font-size: 14px; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 3000; border-radius: 15px; }
        .result-content { width: 92%; max-width: 350px; padding: 40px 15px; border-radius: 40px; text-align: center; transform: rotate(-15deg); animation: modalPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        @keyframes modalPop { from { transform: scale(0.5) rotate(-15deg); opacity: 0; } to { transform: scale(1) rotate(-15deg); opacity: 1; } }
        .result-title { font-weight: bold; white-space: nowrap; margin-bottom: 20px; color: #000; }
        .result-images { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .result-images img { width: 60px; height: 60px; object-fit: contain; border-radius: 12px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border: 1px solid #f0f0f0; }
        
        .prize-frame { border: 2.5px solid #eccc68; background: #fff; border-radius: 15px; min-height: 70px; margin: 0 auto 20px; width: 92%; display: none; padding: 12px 8px; line-height: 1.4; font-weight: bold; color: #333; font-size: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .prize-frame small { font-size: 11px; font-weight: normal; color: #666; margin-top: 2px; }

        .close-result-btn { background: #000; color: #fff; border: none; padding: 14px 40px; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .res-win { background: #fff; border: 5px solid var(--accent-color); border-radius: 40px; box-shadow: 0 0 25px rgba(236, 204, 104, 0.6); }
        .res-win .result-title { color: #d35400; text-shadow: 1px 1px 0 #fff; }
        .res-lose { background: #fff; border: 4px solid #ccc; border-radius: 20px; }
        .res-lose .result-title { color: #666; }
        .res-lose .close-result-btn { background: #333; }
        .practice-warning { color: #ff4757; font-weight: bold; font-size: 11px; margin-bottom: 8px; display: none; }
        .practice-restart-btn { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #fff; padding: 4px 8px; border-radius: 8px; font-size: 9px; cursor: pointer; display: none; line-height: 1.2; text-align: center; transform: rotate(15deg); }

        .close-x-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #ccc; cursor: pointer; font-weight: bold; width: 44px; height: 44px; display: none; align-items: center; justify-content: center; transform: rotate(15deg); }
        .staff-verify-area { display: none; margin-top: 10px; }
        .staff-guide { font-size: 10px; color: #666; margin-bottom: 5px; font-weight: bold; line-height: 1.3; }
        .staff-pass-container { display: flex; justify-content: center; gap: 6px; }
        .staff-pass-input { width: 35px; height: 40px; border: 2px solid #333; border-radius: 6px; text-align: center; font-size: 20px; font-weight: bold; color: #000; background: #fff; outline: none; }
        .staff-pass-input:focus { border-color: var(--accent-color); }
        .staff-done-text { font-size: 22px; font-weight: bold; color: #ff4757; margin-top: 10px; display: none; }

        #nameInput { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; width: 90%; box-sizing: border-box; background-color: #eee; pointer-events: none; }
    </style>
</head>
<body>
    <div id="initialLoading" style="display:none;"><div class="spinner"></div><p style="margin-top:15px; font-size:14px; color:#ccc;">データを読み込み中...</p></div>
    
    <div id="pwScreen">
        <img src="https://i.imgur.com/skWZ5bB.png" class="pw-banner" id="pwBanner">
        <p style="margin:0 0 10px;">予約特典のパスコードを入力</p>
        <div class="pw-container">
            <input type="text" class="pw-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            <span class="pw-separator">-</span>
            <input type="text" class="pw-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            <input type="text" class="pw-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            <input type="text" class="pw-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            <span class="pw-separator">-</span>
            <input type="text" class="pw-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            <input type="text" class="pw-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            <input type="text" class="pw-input" maxlength="1" inputmode="numeric" pattern="[0-9]*">
        </div>
        <div id="pwStatus"></div>
        <div class="pw-hint">練習モード 8-888-888</div>
        
        <div id="pwNameContainer">
            <div id="pwNameGuide" class="pw-name-label">ニックネームを入力</div>
            <input type="text" id="pwNameInput" class="pw-name-input" placeholder="ニックネーム" maxlength="7" disabled>
            <button id="pwOkBtn" class="pw-ok-btn" onclick="finalizeAuth()">OK</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div class="version-display">ver.3.6.0</div>
    
    <canvas id="confetti"></canvas>
    <div class="banner-container" id="mainBanner">
        <img src="https://i.imgur.com/skWZ5bB.png" alt="Banner">
    </div>
    <div class="winner-board">
        <div id="wb-title">
            <div class="prob-display">(当選確率10%)</div>
            <div class="title-main">🏆</div>
        </div>
        <div id="winnerList" class="winner-grid"></div>
    </div>
    <div class="slot-machine">
        <div id="practiceModeLabel">【練習モード】</div>
        <div id="resultOverlay" class="result-overlay">
            <div id="resultContent" class="result-content">
                <div id="closeXBtn" class="close-x-btn" onclick="closeResultModal()">×</div>
                <div id="practiceWarning" class="practice-warning">[練習モードの為、特典は受け取れません]</div>
                <div id="resultText" class="result-title"></div>
                <div id="resultImages" class="result-images"></div>
                <div id="prizeFrame" class="prize-frame"></div>
                
                <button id="closeBtn" class="close-result-btn" onclick="closeResultModal()">閉じる</button>

                <div id="staffVerifyArea" class="staff-verify-area">
                    <div id="staffGuide" class="staff-guide">カウンタースタッフにみせて<br>商品と交換してください</div>
                    <div id="staffInputBox" class="staff-pass-container">
                        <input type="text" class="staff-pass-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="staff-pass-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="staff-pass-input" maxlength="1" inputmode="numeric">
                        <input type="text" class="staff-pass-input" maxlength="1" inputmode="numeric">
                    </div>
                    <div style="font-size: 10px; color: #666; margin-top: 8px; line-height: 1.4;">
                        9階スタッフがパスコード入力後に<br>
                        商品と交換します
                    </div>
                    <div id="staffDoneText" class="staff-done-text">商品交換済み</div>
                </div>

                <button id="practiceRestartBtn" class="practice-restart-btn" onclick="location.reload()">パスコード<br>入力画面に戻る</button>
            </div>
        </div>
        <div class="reels-container">
            <div class="reel-window"><div id="strip1" class="reel-strip"></div></div>
            <div class="reel-window"><div id="strip2" class="reel-strip"></div></div>
            <div class="reel-window"><div id="strip3" class="reel-strip"></div></div>
        </div>
        <div class="stop-buttons">
            <button class="stop-btn" id="stop1" onclick="handleStop(0)" disabled>STOP</button>
            <button class="stop-btn" id="stop2" onclick="handleStop(1)" disabled>STOP</button>
            <button class="stop-btn" id="stop3" onclick="handleStop(2)" disabled>STOP</button>
        </div>
        <div style="margin-top:15px;">
            <input type="text" id="nameInput" placeholder="ニックネーム" maxlength="7" readonly>
            <button id="drawBtn" class="start-btn" onclick="startSlot()">スタート</button>
        </div>
    </div>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw9hlHzP4p5rDA2vlGClhDchnjYPw_TXq4uwu-xDql6i7MW5Fmfe-9Iz8kguCvyawH6QQ/exec";
    const imgs = { "ハ": "https://i.imgur.com/dyeH1D6.jpeg", "ピ": "https://i.imgur.com/Q4h6Sdv.jpeg", "ボ": "https://i.imgur.com/xFq6HON.jpeg", "ク": "https://i.imgur.com/rnoZlTb.jpeg", "ー": "https://i.imgur.com/WVA6hdU.jpeg", "ス": "https://i.imgur.com/qT7Cbn3.jpeg", "ツ": "https://i.imgur.com/Pq8kdam.jpeg", "緑": "https://i.imgur.com/F84QLmL.png", "赤": "https://i.imgur.com/bSPZH8v.png", "白": "https://i.imgur.com/zsVs8tV.png", "紫": "https://i.imgur.com/QoEnzAy.png", "ピンク": "https://i.imgur.com/wUXQD9g.png", "青": "https://i.imgur.com/sDvV2zp.png", "黄": "https://i.imgur.com/0nr5ml8.png", "オレンジ": "https://i.imgur.com/R6OY57k.png" };
    
    const upperColors = ["ピンク", "黄", "紫", "赤"];
    const lowerColors = ["白", "緑", "青", "オレンジ"];
    const dummyImgs = Object.values(imgs);

    let resultData = null; let stoppedCount = 0; let isProcessing = false;
    let config = { title: "🏆本日の当選者🏆", rows: 4, cols: 2, fontSize: 10, winP: 20, winL: 5, smallP: 60, smallL: 5, loseP: 20, spinSpeed: 0.2 };
    let currentWinners = []; let sessionStopChars = ["", "", ""];
    let isDataReady = false; let currentSessionPw = "";
    let isPracticeMode = false;
    let isAuthProcessing = false;

    function setPwStatus(msg, color) { const s = document.getElementById('pwStatus'); s.innerText = msg; s.style.color = color || "#eccc68"; }

    function initReels() {
        const reelWindow = document.querySelector('.reel-window'); if (!reelWindow) return;
        const reelHeight = reelWindow.offsetHeight;
        for(let i=1; i<=3; i++) {
            const strip = document.getElementById('strip'+i); let html = '';
            for(let j=0; j<10; j++) { const src = dummyImgs[Math.floor(Math.random() * dummyImgs.length)];
            html += `<div class="symbol" style="height:${reelHeight}px;"><img src="${src}"></div>`; }
            strip.innerHTML = html;
            strip.classList.remove('stop-bounce');
        }
    }
    async function startSlot() {
        if (isProcessing) return;
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert("名前を入れてね！");
        isProcessing = true; resultData = null; stoppedCount = 0;
        const drawBtn = document.getElementById('drawBtn'); drawBtn.innerText = "Loading..."; drawBtn.disabled = true;
        
        if (isPracticeMode) {
            await new Promise(resolve => setTimeout(resolve, 800));
            const rand = Math.random() * 100;
            let resStr = "";
            if (rand < config.winP) { resStr = "当たり"; }
            else if (rand < (config.winP + config.smallP)) { resStr = "小当たり"; }
            else { resStr = "ハズレ"; }
            resultData = { status: "success", result: resStr };
        } else {
            try {
                const res = await fetch(`${API_URL}?pw=${currentSessionPw}&name=${encodeURIComponent(name)}&action=draw`);
                resultData = await res.json();
            } catch (e) { alert("通信エラー"); isProcessing = false; drawBtn.disabled = false; drawBtn.innerText = "スタート"; return; }
        }

        if (resultData.status !== "success") {
            alert(resultData.msg || "無効 または 利用済みコードです");
            location.reload(); return;
        }
        
        const resStr = resultData.result;
        if (resStr === "当たり") { 
            sessionStopChars = ["ハ", "ピ", "ボ"]; 
        } else if (resStr === "小当たり") {
            const c = upperColors[Math.floor(Math.random() * upperColors.length)]; 
            sessionStopChars = [c, c, c]; 
        } else {
            const c = lowerColors[Math.floor(Math.random() * lowerColors.length)]; 
            sessionStopChars = [c, c, c]; 
        }

        document.querySelectorAll('.reel-strip').forEach(s => s.style.animationDuration = config.spinSpeed + 's');
        for(let i=1; i<=3; i++) { 
            const s = document.getElementById('strip'+i);
            s.classList.remove('stop-bounce');
            s.classList.add('spinning'); 
            document.getElementById('stop'+i).disabled = false; 
        }
        drawBtn.innerText = "回転中...";
    }
    function handleStop(index) {
        const strip = document.getElementById('strip' + (index + 1)); const btn = document.getElementById('stop' + (index + 1));
        const reelHeight = document.querySelector('.reel-window').offsetHeight;
        btn.disabled = true; strip.classList.remove('spinning');
        const finalChar = sessionStopChars[index];
        strip.innerHTML = `<div class="symbol" style="height:${reelHeight}px;"><img src="${imgs[finalChar]}"></div>`;
        strip.classList.add('stop-bounce');
        stoppedCount++; if (stoppedCount === 3) setTimeout(finish, 1500);
    }

    function finish() {
        const res = resultData.result; 
        const overlay = document.getElementById('resultOverlay'); 
        const text = document.getElementById('resultText');
        const imgDiv = document.getElementById('resultImages'); 
        const content = document.getElementById('resultContent');
        const warning = document.getElementById('practiceWarning');
        const restartBtn = document.getElementById('practiceRestartBtn');
        const prizeFrame = document.getElementById('prizeFrame');
        const closeBtn = document.getElementById('closeBtn');
        const closeXBtn = document.getElementById('closeXBtn');
        const staffArea = document.getElementById('staffVerifyArea');

        content.className = 'result-content'; 
        imgDiv.innerHTML = sessionStopChars.map(c => `<img src="${imgs[c]}">`).join('');
        text.style.fontSize = (window.innerWidth / 100 * 7.5) + "px";
        
        warning.style.display = isPracticeMode ? "block" : "none";
        restartBtn.style.display = isPracticeMode ? "block" : "none";

        let fTitle = ""; 
        let prizeHTML = "";

        if (res === "当たり") {
            fTitle = "大当たり！おめでとう！";
            prizeHTML = isPracticeMode ? "<div>練習モードなので景品はありません</div>" 
                        : "<div>チェキ券1枚</div><small>(1,000円分)</small>";
        } else if (res === "小当たり") {
            fTitle = "当たり！おめでとう！";
            prizeHTML = isPracticeMode ? "<div>練習モードなので景品はありません</div>" 
                        : "<div>お好きな缶詰1つ</div><small>+うまい棒2本</small>";
        } else {
            fTitle = "小当たり！おめでとう！";
            prizeHTML = isPracticeMode ? "<div>練習モードなので景品はありません</div>" 
                        : "<div>蒲焼さん太郎1つ</div><small>(在庫により銘柄変更あり)</small>";
        }

        text.innerText = fTitle;
        prizeFrame.innerHTML = prizeHTML;
        prizeFrame.style.display = 'flex';

        if (isPracticeMode) {
            closeBtn.style.display = "inline-block";
            closeXBtn.style.display = "none";
            staffArea.style.display = "none";
            content.classList.add('res-win');
            startConfetti();
        } else {
            closeBtn.style.display = "none";
            closeXBtn.style.display = "none";
            staffArea.style.display = "block";
            content.classList.add('res-win');
            initStaffInput(); 
            startConfetti();
        }
        
        overlay.style.display = 'flex'; 
        if (!isPracticeMode) updateWinners();
    }
    
    function initStaffInput() {
        const inputs = document.querySelectorAll('.staff-pass-input');
        inputs.forEach(i => i.value = '');
        inputs.forEach((input, idx) => {
            input.oninput = (e) => {
                input.value = input.value.replace(/[^0-9]/g, '');
                if (input.value && idx < inputs.length - 1) inputs[idx + 1].focus();
                const code = Array.from(inputs).map(i => i.value).join('');
                if (code.length === 4) {
                    if (code === "8181") {
                        document.getElementById('staffGuide').style.display = 'none';
                        document.getElementById('staffInputBox').style.display = 'none';
                        document.getElementById('staffDoneText').style.display = 'block';
                        document.getElementById('closeXBtn').style.display = 'flex';
                    } else {
                        inputs.forEach(i => { i.value = ''; i.style.borderColor = '#ff4757'; });
                        inputs[0].focus();
                        setTimeout(() => inputs.forEach(i => i.style.borderColor = '#333'), 500);
                    }
                }
            };
            input.onkeydown = (e) => { if (e.key === 'Backspace' && !input.value && idx > 0) inputs[idx - 1].focus(); };
        });
    }

    function closeResultModal() { 
        document.getElementById('resultOverlay').style.display = 'none'; 
        if (isPracticeMode) {
            isProcessing = false;
            const drawBtn = document.getElementById('drawBtn');
            drawBtn.disabled = false;
            drawBtn.innerText = "スタート";
            initReels();
        } else {
            location.reload(); 
        }
    }
    async function updateWinners() {
        if (isPracticeMode) return;
        if (isProcessing && stoppedCount < 3) return; 
        try {
            const res = await fetch(`${API_URL}?action=getBoard`);
            const data = await res.json();
            currentWinners = data.winners || [];
            if (data.config) { config = {...config, ...data.config}; }
            renderWinnerBoard();
        } catch (e) {}
    }

    // ボードタイトルの差し込み修正箇所
    function renderWinnerBoard() {
        const list = document.getElementById('winnerList'); if(!list) return;
        list.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`; 
        list.style.fontSize = `${config.fontSize}px`; 
        
        // タイトル表示（確率の追加とサイズアップ）
        const titleArea = document.getElementById('wb-title');
        titleArea.innerHTML = `
            <div class="prob-display">(当選確率10%)</div>
            <div class="title-main">${config.title}</div>
        `;

        const bigOnly = currentWinners.filter(w => w.type === "当たり").map(w => w.name);
        let html = ''; const totalSlots = (parseInt(config.rows) || 4) * (parseInt(config.cols) || 2);
        for (let k = 0; k < totalSlots; k++) { const name = bigOnly[k] || ""; html += `<div class="winner-item">${name ? '🎊 ' + name : ''}</div>`; }
        list.innerHTML = html;
    }

    function startConfetti() { const canvas = document.getElementById("confetti"); const ctx = canvas.getContext("2d"); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = Array.from({length:80}, () => ({x:Math.random()*canvas.width, y:-20, s:Math.random()*8+4, c:`hsl(${Math.random()*360},100%,50%)`, sp:Math.random()*6+3})); drawP(); function drawP() { ctx.clearRect(0,0,canvas.width,canvas.height);
        p.forEach(i => { ctx.fillStyle=i.c; ctx.fillRect(i.x, i.y+=i.sp, i.s, i.s); if(i.y>canvas.height) i.y=-20; }); if(p.length>0) requestAnimationFrame(drawP); } setTimeout(() => p = [], 4000);
    }

    async function initPwLogic() {
        const inputs = document.querySelectorAll('.pw-input'); 
        const nameInput = document.getElementById('pwNameInput'); 
        const nameGuide = document.getElementById('pwNameGuide');
        const okBtn = document.getElementById('pwOkBtn');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', async (e) => {
                if (isAuthProcessing) return;
                let val = e.target.value.replace(/[^0-9]/g, ''); e.target.value = val;
                if (val && index < inputs.length - 1) inputs[index + 1].focus();
                
                const code = Array.from(inputs).map(i => i.value).join('');
                if (code.length === 7) {
                    isAuthProcessing = true;
                    inputs.forEach(i => i.disabled = true);
                    setPwStatus("認証中...", "#eccc68");
                    
                    if (code === "8888888") {
                        currentSessionPw = code;
                        setPwStatus("認証完了！", "#2ecc71");
                        nameInput.disabled = false; nameGuide.style.display = "block";
                        nameInput.focus(); okBtn.style.display = "block";
                        isPracticeMode = true;
                        document.getElementById('practiceModeLabel').style.display = 'block';
                    } else {
                        try {
                            const res = await fetch(`${API_URL}?action=preAuth&pw=${code}`);
                            const data = await res.json();
                            if (data.status === "success") {
                                currentSessionPw = code;
                                setPwStatus("認証完了！", "#2ecc71");
                                nameInput.disabled = false; nameGuide.style.display = "block";
                                nameInput.focus(); okBtn.style.display = "block";
                            } else { 
                                setPwStatus("無効 または 利用済みコードです", "#ff4757");
                                resetPwInputs(); 
                            }
                        } catch (err) { 
                            setPwStatus("通信エラー", "#ff4757"); 
                            resetPwInputs(); 
                        }
                    }
                } else { setPwStatus("", ""); }
            });
            input.addEventListener('keydown', (e) => { 
                if (isAuthProcessing) { e.preventDefault(); return; }
                if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus(); 
            });
        });
    }
    function resetPwInputs() { 
        setTimeout(() => { 
            const inputs = document.querySelectorAll('.pw-input');
            inputs.forEach(i => { i.value = ''; i.disabled = false; }); 
            isAuthProcessing = false;
            inputs[0].focus(); 
        }, 1500); 
    }
    function finalizeAuth() {
        const name = document.getElementById('pwNameInput').value.trim(); if (!name) return alert("名前を入れてね");
        document.getElementById('nameInput').value = name; document.getElementById('pwScreen').style.display = 'none';
        if (!isDataReady) document.getElementById('initialLoading').style.display = 'flex';
        checkAndHideLoading();
    }
    function checkAndHideLoading() { if (isDataReady && document.getElementById('pwScreen').style.display === 'none') document.getElementById('initialLoading').style.display = 'none'; }

    window.onload = async () => {
        initReels(); initPwLogic(); document.getElementById('pwScreen').style.display = 'flex';
        const loadEssentialData = async () => {
            try {
                const configPromise = fetch(`${API_URL}?action=loadConfig`).then(res => res.json());
                const [loaded] = await Promise.all([configPromise, priorityPromise]);
                if (loaded) config = {...config, ...loaded};
            } catch (e) {}
        };
        await Promise.race([loadEssentialData(), new Promise(r => setTimeout(r, 4000))]);
        isDataReady = true; renderWinnerBoard(); checkAndHideLoading();
        updateWinners(); setInterval(updateWinners, 8000);
    };
    window.onresize = initReels;
</script>
</body>
</html>
