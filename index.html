<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RopChecker ver.0.01</title>
  <style>
    /* * RopChecker
     * ver. 0.01
     */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f0f0f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    /* 共通セクション設定 */
    section {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #ccc;
      box-sizing: border-box;
      width: 100%;
    }

    .section-header {
      background-color: #e0e0e0;
      font-size: 12px;
      font-weight: bold;
      padding: 2px 8px;
      color: #333;
      flex-shrink: 0;
    }

    /* 段別の比率設定 0.5 : 2.5 : 3.5 : 5 */
    .section-1 {
      flex: 0.5;
      background-color: #333;
      color: white;
      justify-content: center;
      align-items: center;
      border-bottom: none;
    }
    .section-1 .title-bar {
      font-size: 16px;
      font-weight: bold;
    }

    .section-2 {
      flex: 2.5;
    }

    .section-3 {
      flex: 3.5;
    }

    .section-4 {
      flex: 5;
      border-bottom: none;
    }

    /* 入力エリア設定 */
    textarea {
      flex: 1;
      width: 100%;
      border: none;
      padding: 10px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 14px;
      resize: none;
      outline: none;
      background-color: #fff;
    }

    /* 差分表示エリア設定 */
    .diff-display {
      flex: 1;
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      background-color: #fafafa;
      font-family: monospace;
      font-size: 14px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="container">
    <section class="section-1">
      <div class="title-bar">RopChecker  ver.0.01</div>
    </section>

    <section class="section-2">
      <div class="section-header">マスターコード</div>
      <textarea id="master-code" placeholder="ここにマスターコードを貼り付けてください"></textarea>
    </section>

    <section class="section-3">
      <div class="section-header">レビューコード</div>
      <textarea id="review-code" placeholder="ここにレビューコードを貼り付けてください"></textarea>
    </section>

    <section class="section-4">
      <div class="section-header">マスターコードとの差分</div>
      <div id="diff-output" class="diff-display"></div>
    </section>
  </div>

  <script>
    /**
     * RopChecker
     * ver. 0.01
     */
    // 現時点ではレイアウトのみ。ロジックは次フェーズにて実装。
  </script>
</body>
</html>
