<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RopChecker ver.0.06</title>
  <style>
    /* * RopChecker ver. 0.06
     * Theme: Elegant Milk Tea (Bright & Pop)
     * Mode: Intelligent Integrity Inspector (Dialogue Mode)
     */
    :root {
      --bg-color: #fdf8f2;
      --container-bg: #f5ece1;
      --accent-color: #8e5d52;
      --text-main: #5d4a44;
      --input-bg: #ffffff;
      --error-color: #d9534f;
      --ok-color: #5cb85c;
      --card-bg: #ffffff;
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background-color: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-main);
    }

    .container {
      display: flex; flex-direction: column; width: 100%; height: 100vh;
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
      box-sizing: border-box;
    }

    section {
      display: flex; flex-direction: column;
      border-bottom: 1px solid rgba(142, 93, 82, 0.1);
      box-sizing: border-box; width: 100%; overflow: hidden;
    }

    .section-header {
      background-color: var(--container-bg); font-size: 10px; font-weight: 700;
      padding: 4px 10px; color: var(--accent-color);
      display: flex; justify-content: space-between; align-items: center;
    }

    .version-display { font-weight: 500; font-size: 9px; background: var(--bg-color); padding: 1px 6px; border-radius: 8px; }

    /* 構成比率を 0.5 : 1.5 : 9.5 に変更 */
    .section-top { flex: 0.5; background-color: var(--bg-color); color: var(--accent-color); justify-content: center; align-items: center; border-bottom: 2px solid var(--container-bg); }
    .title-bar { font-size: 16px; font-weight: 800; }

    .section-middle { flex: 1.5; flex-direction: row !important; background-color: var(--container-bg); }
    .editor-pane { flex: 1; display: flex; flex-direction: column; height: 100%; border-right: 1px solid rgba(142, 93, 82, 0.1); }

    .section-bottom { flex: 9.5; border-bottom: none; background-color: #fffaf5; }

    textarea {
      flex: 1; width: 100%; border: none; padding: 8px; box-sizing: border-box;
      font-family: "SF Mono", Menlo, monospace; font-size: 10px;
      line-height: 1.2; resize: none; outline: none;
      background-color: var(--input-bg); color: var(--text-main);
    }

    /* 対話型インスペクター用スタイル */
    .inspector-report {
      flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box;
    }
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 6px; font-weight: 800; margin-bottom: 15px; font-size: 12px;
    }
    .status-ng { background: var(--error-color); color: white; }
    .status-ok { background: var(--ok-color); color: white; }
    .status-wait { background: #ccc; color: white; }

    /* 質問カード UI */
    .question-card {
      background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px;
      box-shadow: 0 4px 6px rgba(142, 93, 82, 0.05); border: 1px solid rgba(142, 93, 82, 0.1);
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .q-title { font-size: 11px; color: var(--accent-color); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .q-body { font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
    .q-diff { background: #f8f8f8; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 11px; margin-bottom: 12px; }
    .old-val { color: var(--error-color); text-decoration: line-through; margin-right: 8px; }
    .new-val { color: var(--ok-color); font-weight: bold; }
    
    .btn-group { display: flex; gap: 10px; }
    .btn {
      flex: 1; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    .btn-yes { background-color: var(--ok-color); color: white; }
    .btn-no { background-color: var(--error-color); color: white; }
    .btn:active { transform: scale(0.95); opacity: 0.8; }
    .btn-yes.approved { background-color: #eee; color: #aaa; pointer-events: none; }

    #save-status { position: fixed; top: 10px; right: 10px; font-size: 9px; color: var(--accent-color); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  </style>
</head>
<body>

  <div id="save-status">Saving DNA...</div>

  <div class="container">
    <section class="section-top">
      <div class="title-bar">RopChecker <span style="font-size: 10px; opacity: 0.6;">ver.0.06</span></div>
    </section>

    <section class="section-middle">
      <div class="editor-pane">
        <div class="section-header"><span>Master (Sanctuary)</span><span id="master-ver" class="version-display"></span></div>
        <textarea id="master-code" placeholder="Master DNA..."></textarea>
      </div>
      <div class="editor-pane">
        <div class="section-header"><span>AI Review (Candidate)</span><span id="review-ver" class="version-display"></span></div>
        <textarea id="review-code" placeholder="Review Candidate..."></textarea>
      </div>
    </section>

    <section class="section-bottom">
      <div class="section-header"><span>Dialogue Integrity Inspection</span></div>
      <div id="diff-output" class="inspector-report">
        <div class="status-badge status-wait">Awaiting Input</div>
        <p>コードを解析し、意図しない改変を抽出します。</p>
      </div>
    </section>
  </div>

  <script>
    const masterInput = document.getElementById('master-code');
    const reviewInput = document.getElementById('review-code');
    const masterVerDisp = document.getElementById('master-ver');
    const reviewVerDisp = document.getElementById('review-ver');
    const reportOutput = document.getElementById('diff-output');
    const saveStatus = document.getElementById('save-status');

    let approvedChanges = new Set();
    let saveTimeout;

    // 属性抽出用正規表現（比率、色、サイズ、文言など）
    const extractors = [
      { id: 'flex-ratio', name: '画面構成の比率', regex: /flex:\s*([\d\.]+);/g, template: "比率が {old} から {new} に変更されています。" },
      { id: 'color-hex', name: 'UIカラー定義', regex: /#[0-9a-fA-F]{3,6}/g, template: "色が {old} から {new} に変更されています。" },
      { id: 'pixel-size', name: 'サイズ定義', regex: /\d+px/g, template: "サイズが {old} から {new} に変更されています。" }
    ];

    function updateVersion(text, displayElement) {
      const match = text.match(/(?:ver\.?|version[:\s]|v)\s*([\d\.]+)/i);
      displayElement.textContent = match ? match[0] : '';
    }

    /**
     * 対話型検閲エンジン
     */
    function runDialogueInspection() {
      const mText = masterInput.value;
      const rText = reviewInput.value;

      if (!mText || !rText) {
        reportOutput.innerHTML = '<div class="status-badge status-wait">Ready</div><p>コードを貼り付けてください。</p>';
        return;
      }

      const diffs = [];

      // 1. 各正規表現でプロパティをスキャン
      extractors.forEach(ext => {
        const mMatches = [...mText.matchAll(ext.regex)].map(m => m[0]);
        const rMatches = [...rText.matchAll(ext.regex)].map(m => m[0]);

        // インデックスごとに比較（順序が重要なため）
        mMatches.forEach((mVal, idx) => {
          const rVal = rMatches[idx];
          if (rVal && mVal !== rVal) {
            const changeId = `${ext.id}-${idx}-${mVal}-${rVal}`;
            if (!approvedChanges.has(changeId)) {
              diffs.push({
                id: changeId,
                category: ext.name,
                msg: ext.template.replace('{old}', mVal).replace('{new}', rVal),
                old: mVal,
                new: rVal
              });
            }
          }
        });
      });

      // 2. 行の欠落チェック（デグレード検知）
      const mLines = mText.split('\n').map(l => l.trim()).filter(l => l.length > 20); // 長い行に限定して意味を抽出
      const rTextMin = rText.replace(/\s/g, '');
      mLines.forEach((line, idx) => {
        const lineMin = line.replace(/\s/g, '');
        if (!rTextMin.includes(lineMin)) {
          const changeId = `line-missing-${idx}`;
          if (!approvedChanges.has(changeId)) {
            diffs.push({
              id: changeId,
              category: "機能・ロジックの消失",
              msg: "マスターにある以下の記述が見当たりません。削除されましたか？",
              old: line,
              new: "(削除済み)"
            });
          }
        }
      });

      renderDialogue(diffs);
    }

    function approve(id) {
      approvedChanges.add(id);
      runDialogueInspection();
    }

    function renderDialogue(diffs) {
      let html = '';
      if (diffs.length === 0) {
        html = '<div class="status-badge status-ok">PASS: 100% INTEGRITY</div>';
        html += '<p>全ての変更が承認されたか、あるいはマスターと完全一致しています。倉庫への保管を許可します。</p>';
      } else {
        html = `<div class="status-badge status-ng">WAITING FOR DECISION: ${diffs.length} items</div>`;
        diffs.forEach(d => {
          html += `
            <div class="question-card">
              <div class="q-title">${d.category}</div>
              <div class="q-body">${d.msg}</div>
              <div class="q-diff"><span class="old-val">${d.old}</span> → <span class="new-val">${d.new}</span></div>
              <div class="btn-group">
                <button class="btn btn-yes" onclick="approve('${d.id}')">はい（意図的）</button>
                <button class="btn btn-no" onclick="alert('修正が必要です。AIに再度指示してください。')">いいえ（改ざん）</button>
              </div>
            </div>`;
        });
      }
      reportOutput.innerHTML = html;
    }

    function scheduleSaveAndCheck() {
      saveStatus.style.opacity = 0;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        try {
          localStorage.setItem('rop_master', masterInput.value);
          localStorage.setItem('rop_review', reviewInput.value);
          saveStatus.style.opacity = 1;
          setTimeout(() => saveStatus.style.opacity = 0, 1000);
        } catch (e) {}
        runDialogueInspection();
      }, 1500);
    }

    window.addEventListener('load', () => {
      masterInput.value = localStorage.getItem('rop_master') || '';
      reviewInput.value = localStorage.getItem('rop_review') || '';
      updateVersion(masterInput.value, masterVerDisp);
      updateVersion(reviewInput.value, reviewVerDisp);
      runDialogueInspection();
    });

    [masterInput, reviewInput].forEach(el => {
      el.addEventListener('input', (e) => {
        updateVersion(e.target.value, e.target.id === 'master-code' ? masterVerDisp : reviewVerDisp);
        scheduleSaveAndCheck();
      });
    });
  </script>
</body>
</html>
