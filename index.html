<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RopChecker ver.0.08</title>
  <style>
    /* * RopChecker ver. 0.08
     * Theme: Elegant Milk Tea (Bright & Pop)
     * Mode: AI-Native + High-Speed Operator
     */
    :root {
      --bg-color: #fdf8f2;
      --container-bg: #f5ece1;
      --accent-color: #8e5d52;
      --text-main: #5d4a44;
      --input-bg: #ffffff;
      --error-color: #d9534f;
      --ok-color: #5cb85c;
      --card-bg: #ffffff;
      --ai-color: #6e8efb;
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background-color: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-main);
    }

    .container {
      display: flex; flex-direction: column; width: 100%; height: 100vh;
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
      box-sizing: border-box;
    }

    section {
      display: flex; flex-direction: column;
      border-bottom: 1px solid rgba(142, 93, 82, 0.1);
      box-sizing: border-box; width: 100%; overflow: hidden;
    }

    .section-header {
      background-color: var(--container-bg); font-size: 10px; font-weight: 700;
      padding: 4px 10px; color: var(--accent-color);
      display: flex; justify-content: space-between; align-items: center;
    }

    .version-display { font-weight: 500; font-size: 9px; background: var(--bg-color); padding: 1px 6px; border-radius: 8px; }

    .section-top { flex: 0.5; background-color: var(--bg-color); color: var(--accent-color); justify-content: center; align-items: center; border-bottom: 2px solid var(--container-bg); position: relative; }
    .title-bar { font-size: 16px; font-weight: 800; }

    .api-config { position: absolute; right: 10px; display: flex; align-items: center; gap: 5px; }
    .api-input { 
      font-size: 10px; border: 1px solid var(--container-bg); padding: 2px 5px; border-radius: 4px; 
      width: 0; opacity: 0; transition: 0.3s; outline: none;
    }
    .api-input.show { width: 120px; opacity: 1; }
    .key-btn { cursor: pointer; font-size: 14px; opacity: 0.6; }

    .section-middle { flex: 1.5; flex-direction: row !important; background-color: var(--container-bg); position: relative; }
    .editor-pane { flex: 1; display: flex; flex-direction: column; height: 100%; border-right: 1px solid rgba(142, 93, 82, 0.1); position: relative; }

    /* コピペ用←ボタン */
    .copy-arrow {
      position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%);
      width: 28px; height: 28px; background: var(--accent-color); color: white;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      font-size: 16px; border: 2px solid white; transition: 0.2s;
    }
    .copy-arrow:active { transform: translate(-50%, -50%) scale(0.9); }

    .clear-btn { cursor: pointer; color: var(--error-color); font-size: 9px; text-decoration: underline; }

    .section-bottom { flex: 9.5; border-bottom: none; background-color: #fffaf5; position: relative; }

    textarea {
      flex: 1; width: 100%; border: none; padding: 8px; box-sizing: border-box;
      font-family: "SF Mono", Menlo, monospace; font-size: 10px;
      line-height: 1.2; resize: none; outline: none;
      background-color: var(--input-bg); color: var(--text-main);
    }

    .inspector-report { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; }
    
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-weight: 800; margin-bottom: 15px; font-size: 12px; }
    .status-ng { background: var(--error-color); color: white; }
    .status-ok { background: var(--ok-color); color: white; }
    .status-wait { background: #ccc; color: white; }
    .status-ai { background: var(--ai-color); color: white; }

    .question-card {
      background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px;
      box-shadow: 0 4px 6px rgba(142, 93, 82, 0.05); border: 1px solid rgba(142, 93, 82, 0.1);
    }
    
    .btn-group { display: flex; gap: 10px; }
    .btn { flex: 1; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-yes { background-color: var(--ok-color); color: white; }
    .btn-no { background-color: var(--error-color); color: white; }

    /* Undoモーダル */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(142, 93, 82, 0.3); backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-card {
      background: var(--bg-color); padding: 20px; border-radius: 16px; width: 80%; max-width: 300px;
      text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .modal-msg { margin-bottom: 20px; font-weight: bold; font-size: 14px; color: var(--accent-color); }
    .undo-btn { background: var(--accent-color); color: white; width: 100%; margin-bottom: 10px; }
    .close-btn { background: transparent; color: var(--text-main); font-size: 12px; }

    #save-status { position: fixed; top: 10px; left: 10px; font-size: 9px; color: var(--accent-color); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  </style>
</head>
<body>

  <div id="save-status">🧬 DNA Synced...</div>

  <div id="undo-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-msg">Masterを更新しました</div>
      <button class="btn undo-btn" onclick="undoCopy()">Undo (元に戻す)</button>
      <button class="btn close-btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>

  <div class="container">
    <section class="section-top">
      <div class="title-bar">RopChecker <span style="font-size: 10px; opacity: 0.6;">ver.0.08</span></div>
      <div class="api-config">
        <input type="password" id="api-key" class="api-input" placeholder="Gemini API Key...">
        <span class="key-btn" onclick="document.getElementById('api-key').classList.toggle('show')">🔑</span>
      </div>
    </section>

    <section class="section-middle">
      <div class="editor-pane">
        <div class="section-header"><span>Master (Sanctuary)</span><span id="master-ver" class="version-display"></span></div>
        <textarea id="master-code" placeholder="Master DNA..."></textarea>
      </div>
      <div class="editor-pane">
        <div class="copy-arrow" onclick="executeCopy()">←</div>
        <div class="section-header">
          <span>AI Review (Candidate)</span>
          <div style="display:flex; gap:8px; align-items:center;">
            <span id="review-ver" class="version-display"></span>
            <span class="clear-btn" onclick="clearReview()">Clear</span>
          </div>
        </div>
        <textarea id="review-code" placeholder="Review Candidate..."></textarea>
      </div>
    </section>

    <section class="section-bottom">
      <div class="section-header"><span>AI Brain Inspection Report</span></div>
      <div id="diff-output" class="inspector-report"></div>
    </section>
  </div>

  <script>
    const masterInput = document.getElementById('master-code');
    const reviewInput = document.getElementById('review-code');
    const apiKeyInput = document.getElementById('api-key');
    const masterVerDisp = document.getElementById('master-ver');
    const reviewVerDisp = document.getElementById('review-ver');
    const reportOutput = document.getElementById('diff-output');
    const modal = document.getElementById('undo-modal');
    const saveStatus = document.getElementById('save-status');

    let approvedChanges = new Set();
    let saveTimeout;
    let masterCache = "";

    // オートペースト機能
    async function handleAutoPaste(el) {
      if (el.value.length === 0) {
        try {
          const text = await navigator.clipboard.readText();
          el.value = text;
          scheduleSaveAndCheck();
        } catch (err) { console.log("Paste blocked"); }
      }
    }

    [masterInput, reviewInput].forEach(el => {
      el.addEventListener('click', () => handleAutoPaste(el));
    });

    function executeCopy() {
      masterCache = masterInput.value;
      masterInput.value = reviewInput.value;
      modal.style.display = 'flex';
      scheduleSaveAndCheck();
    }

    function undoCopy() {
      masterInput.value = masterCache;
      closeModal();
      scheduleSaveAndCheck();
    }

    function closeModal() { modal.style.display = 'none'; }

    function clearReview() {
      reviewInput.value = "";
      scheduleSaveAndCheck();
    }

    async function runAIInspection(master, review, apiKey) {
      if (!master || !review) return;
      reportOutput.innerHTML = '<div style="font-size:12px; color:var(--ai-color);">解析中...</div>';
      const prompt = `あなたは厳格なフロントエンド品質管理官です。マスターとレビューの差分を分析し、人間（開発者）に問いかけるべき変更点を抽出してください。比率(flex)、色、サイズ、削除を特定し、「〜を変更したのは〜の意図ですか？」という口調でJSON配列で返してください。[{"id":"id","category":"カテゴリ","msg":"問いかけ","old":"旧","new":"新"}]`;
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt + "\nMaster:\n" + master + "\nReview:\n" + review }] }] })
        });
        const data = await response.json();
        const diffs = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());
        renderDialogue(diffs, true);
      } catch (e) { runLegacyInspection(); }
    }

    function runLegacyInspection() {
      const m = masterInput.value; const r = reviewInput.value;
      if (!m || !r) { reportOutput.innerHTML = '<div class="status-badge status-wait">Ready</div>'; return; }
      const diffs = [];
      const ex = [{ id: 'flex', name: '画面構成', regex: /flex:\s*([\d\.]+);/g }];
      ex.forEach(e => {
        const mMs = [...m.matchAll(e.regex)].map(x => x[0]);
        const rMs = [...r.matchAll(e.regex)].map(x => x[0]);
        mMs.forEach((v, i) => {
          if (rMs[i] && v !== rMs[i]) diffs.push({ id: e.id+i, category: e.name, msg: `比率が${v}から${rMs[i]}に変わっています。`, old: v, new: rMs[i] });
        });
      });
      renderDialogue(diffs, false);
    }

    function renderDialogue(diffs, isAI) {
      const filtered = diffs.filter(d => !approvedChanges.has(d.id));
      let html = filtered.length === 0 ? '<div class="status-badge status-ok">PASS</div>' : `<div class="status-badge ${isAI?'status-ai':'status-ng'}">${filtered.length} Issues</div>`;
      filtered.forEach(d => {
        html += `<div class="question-card"><div style="font-size:10px; color:var(--ai-color); font-weight:bold;">${d.category}</div><div style="font-size:13px; margin:8px 0;">${d.msg}</div><div style="font-family:monospace; font-size:11px; background:#f8f8f8; padding:5px;"><span style="color:red; text-decoration:line-through;">${d.old}</span> → <span style="color:green; font-weight:bold;">${d.new}</span></div><div class="btn-group" style="margin-top:10px;"><button class="btn btn-yes" onclick="approve('${d.id}')">はい</button></div></div>`;
      });
      reportOutput.innerHTML = html;
    }

    function approve(id) { approvedChanges.add(id); scheduleSaveAndCheck(); }

    function scheduleSaveAndCheck() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        localStorage.setItem('rop_master', masterInput.value);
        localStorage.setItem('rop_review', reviewInput.value);
        localStorage.setItem('rop_api_key', apiKeyInput.value);
        saveStatus.style.opacity = 1; setTimeout(() => saveStatus.style.opacity = 0, 1000);
        updateVersion(masterInput.value, masterVerDisp);
        updateVersion(reviewInput.value, reviewVerDisp);
        if (apiKeyInput.value) runAIInspection(masterInput.value, reviewInput.value, apiKeyInput.value);
        else runLegacyInspection();
      }, 1500);
    }

    function updateVersion(t, d) { const m = t.match(/(?:ver\.?|v)\s*([\d\.]+)/i); d.textContent = m ? m[0] : ''; }

    window.addEventListener('load', () => {
      masterInput.value = localStorage.getItem('rop_master') || '';
      reviewInput.value = localStorage.getItem('rop_review') || '';
      apiKeyInput.value = localStorage.getItem('rop_api_key') || '';
      scheduleSaveAndCheck();
    });

    [masterInput, reviewInput, apiKeyInput].forEach(el => el.addEventListener('input', scheduleSaveAndCheck));
  </script>
</body>
</html>
